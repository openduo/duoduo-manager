name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
  repository_dispatch:
    types:
      - cc-reader-released

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Prepare signing keychain
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="${RUNNER_TEMP}/build.keychain-db"
          if [ -z "${BUILD_CERTIFICATE_BASE64}" ] || [ -z "${P12_PASSWORD}" ] || [ -z "${KEYCHAIN_PASSWORD}" ]; then
            echo "Missing signing certificate secrets"
            exit 1
          fi

          CERT_PATH="${RUNNER_TEMP}/DeveloperID_Application.p12"
          CERT_PATH="${CERT_PATH}" BUILD_CERTIFICATE_BASE64="${BUILD_CERTIFICATE_BASE64}" python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          cert_path = Path(os.environ["CERT_PATH"])
          cert_bytes = base64.b64decode(os.environ["BUILD_CERTIFICATE_BASE64"])
          cert_path.write_bytes(cert_bytes)
          print(f"decoded certificate bytes: {len(cert_bytes)}")
          PY
          file "${CERT_PATH}"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERT_PATH}" \
            -k "${KEYCHAIN_PATH}" \
            -P "${P12_PASSWORD}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild
          security list-keychains -d user -s "${KEYCHAIN_PATH}" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security find-identity -v -p codesigning "${KEYCHAIN_PATH}"

      - name: Write signing config
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_ID}" ] || [ -z "${APPLE_APP_SPECIFIC_PASSWORD}" ] || [ -z "${APPLE_TEAM_ID}" ] || [ -z "${APPLE_SIGNING_IDENTITY}" ]; then
            echo "Missing notarization secrets"
            exit 1
          fi

          printf '%s\n' \
            "APPLE_ID=\"${APPLE_ID}\"" \
            "APPLE_APP_SPECIFIC_PASSWORD=\"${APPLE_APP_SPECIFIC_PASSWORD}\"" \
            "APPLE_TEAM_ID=\"${APPLE_TEAM_ID}\"" \
            "APPLE_SIGNING_IDENTITY=\"${APPLE_SIGNING_IDENTITY}\"" \
            > .secret.env
          awk -F= '{print $1}' .secret.env

      - name: Build, sign, notarize, and package
        run: make publish

      - name: Clean signing config
        if: always()
        run: rm -f .secret.env

      - name: Clean temporary keychain
        if: always()
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="${RUNNER_TEMP}/build.keychain-db"
          security delete-keychain "${KEYCHAIN_PATH}" || true

      - name: Upload DMG artifacts
        uses: actions/upload-artifact@v4
        with:
          name: duoduo-manager-dmg-${{ github.run_id }}
          path: dist/*.dmg
          if-no-files-found: error

      - name: Create GitHub Release (tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true
          body: |
            ## Build Variants

            - `*-arm64-with-nodejs.dmg`: Apple Silicon (M1/M2/M3/M4), bundled Node.js, ready to use.
            - `*-x86_64-with-nodejs.dmg`: Intel Macs, bundled Node.js, ready to use.
            - `*-universal-lite.dmg`: Universal binary without bundled Node.js, requires system Node.js 22+.

            ## Notes

            - Prefer `with-nodejs` builds for zero-setup usage.
            - Choose `universal-lite` only if you explicitly want to use your system Node.js.

      - name: Create GitHub Release (cc-reader sync)
        if: github.event_name == 'repository_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sync-${{ github.event.client_payload.cc_reader_tag }}
          name: Sync with cc-reader ${{ github.event.client_payload.cc_reader_tag }}
          prerelease: true
          files: dist/*.dmg
          generate_release_notes: true
          body: |
            ## Build Variants

            - `*-arm64-with-nodejs.dmg`: Apple Silicon (M1/M2/M3/M4), bundled Node.js, ready to use.
            - `*-x86_64-with-nodejs.dmg`: Intel Macs, bundled Node.js, ready to use.
            - `*-universal-lite.dmg`: Universal binary without bundled Node.js, requires system Node.js 22+.

            ## Notes

            - This is an automated sync build triggered by a `cc-reader` release.
            - Prefer `with-nodejs` builds for zero-setup usage.
            - Choose `universal-lite` only if you explicitly want to use your system Node.js.
