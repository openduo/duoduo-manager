name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
  repository_dispatch:
    types:
      - cc-reader-released

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Prepare signing keychain
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="${RUNNER_TEMP}/build.keychain-db"
          if [ -z "${BUILD_CERTIFICATE_BASE64}" ] || [ -z "${P12_PASSWORD}" ] || [ -z "${KEYCHAIN_PASSWORD}" ]; then
            echo "Missing signing certificate secrets"
            exit 1
          fi

          CERT_PATH="${RUNNER_TEMP}/DeveloperID_Application.p12"
          CERT_PATH="${CERT_PATH}" BUILD_CERTIFICATE_BASE64="${BUILD_CERTIFICATE_BASE64}" python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          cert_path = Path(os.environ["CERT_PATH"])
          cert_bytes = base64.b64decode(os.environ["BUILD_CERTIFICATE_BASE64"])
          cert_path.write_bytes(cert_bytes)
          print(f"decoded certificate bytes: {len(cert_bytes)}")
          PY
          file "${CERT_PATH}"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERT_PATH}" \
            -k "${KEYCHAIN_PATH}" \
            -P "${P12_PASSWORD}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild
          security list-keychains -d user -s "${KEYCHAIN_PATH}" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security find-identity -v -p codesigning "${KEYCHAIN_PATH}"

      - name: Build, sign, notarize, and package
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
        run: make publish

      - name: Clean temporary keychain
        if: always()
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH="${RUNNER_TEMP}/build.keychain-db"
          security delete-keychain "${KEYCHAIN_PATH}" || true

      - name: Upload DMG artifacts
        uses: actions/upload-artifact@v4
        with:
          name: duoduo-manager-dmg-${{ github.run_id }}
          path: dist/*.dmg
          if-no-files-found: error

      - name: Create GitHub Release (tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        id: create_release
        with:
          files: dist/*.dmg
          generate_release_notes: true
          body: |
            ## Build Variants

            - `*-arm64-with-nodejs.dmg`: Apple Silicon (M1/M2/M3/M4), bundled Node.js, ready to use.
            - `*-x86_64-with-nodejs.dmg`: Intel Macs, bundled Node.js, ready to use.
            - `*-universal-lite.dmg`: Universal binary without bundled Node.js, requires system Node.js 22+.

            ## Notes

            - All builds are signed with Apple Developer ID and notarized.
            - Auto-update is supported via Sparkle for all variants.
            - Prefer `with-nodejs` builds for zero-setup usage.
            - Choose `universal-lite` only if you explicitly want to use your system Node.js.

      - name: Create GitHub Release (cc-reader sync)
        if: github.event_name == 'repository_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sync-${{ github.event.client_payload.cc_reader_tag }}
          name: Sync with cc-reader ${{ github.event.client_payload.cc_reader_tag }}
          prerelease: true
          files: dist/*.dmg
          generate_release_notes: true
          body: |
            ## Build Variants

            - `*-arm64-with-nodejs.dmg`: Apple Silicon (M1/M2/M3/M4), bundled Node.js, ready to use.
            - `*-x86_64-with-nodejs.dmg`: Intel Macs, bundled Node.js, ready to use.
            - `*-universal-lite.dmg`: Universal binary without bundled Node.js, requires system Node.js 22+.

            ## Notes

            - All builds are signed with Apple Developer ID and notarized.
            - This is an automated sync build triggered by a `cc-reader` release.
            - Prefer `with-nodejs` builds for zero-setup usage.
            - Choose `universal-lite` only if you explicitly want to use your system Node.js.

      - name: Generate and deploy Sparkle appcast
        if: startsWith(github.ref, 'refs/tags/')
        env:
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          REPO="openduo/duoduo-manager"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          ARM64_URL="${BASE_URL}/DuoduoManager-${VERSION}-arm64-with-nodejs.dmg"
          X64_URL="${BASE_URL}/DuoduoManager-${VERSION}-x86_64-with-nodejs.dmg"
          LITE_URL="${BASE_URL}/DuoduoManager-${VERSION}-universal-lite.dmg"

          ARM64_SIZE=$(stat -f%z "dist/DuoduoManager-${VERSION}-arm64-with-nodejs.dmg")
          X64_SIZE=$(stat -f%z "dist/DuoduoManager-${VERSION}-x86_64-with-nodejs.dmg")
          LITE_SIZE=$(stat -f%z "dist/DuoduoManager-${VERSION}-universal-lite.dmg")

          # Download Sparkle binary distribution (contains bin/sign_update)
          SPARKLE_VERSION="2.9.1"
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" -o /tmp/sparkle.tar.xz
          mkdir -p /tmp/sparkle-dist
          tar xf /tmp/sparkle.tar.xz -C /tmp/sparkle-dist --strip-components=1

          SIGN_UPDATE="/tmp/sparkle-dist/bin/sign_update"
          if [ ! -f "$SIGN_UPDATE" ]; then
            echo "::warning::sign_update tool not found, skipping appcast"
            exit 0
          fi
          chmod +x "$SIGN_UPDATE"

          # sign_update reads EdDSA private key from keychain
          # Add it to the login keychain (the only one available on CI)
          security add-generic-password -a "ed25519" -s "https://sparkle-project.org" -w "${SPARKLE_PRIVATE_ED_KEY}" -U login.keychain-db 2>/dev/null || true

          # Sign each DMG and extract EdDSA signature
          echo "Signing arm64 DMG..."
          ARM64_SIG=$("$SIGN_UPDATE" -f "dist/DuoduoManager-${VERSION}-arm64-with-nodejs.dmg" 2>&1 | grep -oE 'sparkle:edSignature="[^"]+"' | sed 's/sparkle:edSignature="//;s/"//')
          echo "Signing x86_64 DMG..."
          X64_SIG=$("$SIGN_UPDATE" -f "dist/DuoduoManager-${VERSION}-x86_64-with-nodejs.dmg" 2>&1 | grep -oE 'sparkle:edSignature="[^"]+"' | sed 's/sparkle:edSignature="//;s/"//')
          echo "Signing universal-lite DMG..."
          LITE_SIG=$("$SIGN_UPDATE" -f "dist/DuoduoManager-${VERSION}-universal-lite.dmg" 2>&1 | grep -oE 'sparkle:edSignature="[^"]+"' | sed 's/sparkle:edSignature="//;s/"//')

          echo "ARM64 sig: ${ARM64_SIG}"
          echo "X64 sig: ${X64_SIG}"
          echo "LITE sig: ${LITE_SIG}"

          if [ -z "$ARM64_SIG" ] || [ -z "$X64_SIG" ] || [ -z "$LITE_SIG" ]; then
            echo "::warning::Failed to sign one or more DMGs, skipping appcast"
            exit 0
          fi

          PUB_DATE=$(date -u +"%a, %d %b %Y %H:%M:%S +0000")

          # Generate appcast.xml
          cat > /tmp/appcast.xml <<APPLECAST
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>DuoduoManager</title>
              <link>https://openduo.github.io/duoduo-manager/appcast.xml</link>
              <description>DuoduoManager Updates</description>
              <language>en</language>
              <item>
                <title>DuoduoManager ${VERSION}</title>
                <pubDate>${PUB_DATE}</pubDate>
                <sparkle:channel>arm64-with-nodejs</sparkle:channel>
                <enclosure
                  url="${ARM64_URL}"
                  sparkle:version="${VERSION}"
                  sparkle:shortVersionString="${VERSION}"
                  sparkle:edSignature="${ARM64_SIG}"
                  length="${ARM64_SIZE}"
                  type="application/octet-stream"
                />
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
              </item>
              <item>
                <title>DuoduoManager ${VERSION}</title>
                <pubDate>${PUB_DATE}</pubDate>
                <sparkle:channel>x86_64-with-nodejs</sparkle:channel>
                <enclosure
                  url="${X64_URL}"
                  sparkle:version="${VERSION}"
                  sparkle:shortVersionString="${VERSION}"
                  sparkle:edSignature="${X64_SIG}"
                  length="${X64_SIZE}"
                  type="application/octet-stream"
                />
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
              </item>
              <item>
                <title>DuoduoManager ${VERSION}</title>
                <pubDate>${PUB_DATE}</pubDate>
                <sparkle:channel>universal-lite</sparkle:channel>
                <enclosure
                  url="${LITE_URL}"
                  sparkle:version="${VERSION}"
                  sparkle:shortVersionString="${VERSION}"
                  sparkle:edSignature="${LITE_SIG}"
                  length="${LITE_SIZE}"
                  type="application/octet-stream"
                />
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
              </item>
            </channel>
          </rss>
          APPLECAST

          echo "Generated appcast.xml:"
          cat /tmp/appcast.xml

          # Deploy to gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git checkout gh-pages
          cp /tmp/appcast.xml appcast.xml
          git add appcast.xml
          git commit -m "update appcast for ${TAG}" || true
          git push origin gh-pages

          # Return to main
          git checkout main
