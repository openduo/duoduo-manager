name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
  repository_dispatch:
    types:
      - cc-reader-released

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Print Xcode and SDK versions
        run: |
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-version

      - name: Build .app bundle
        run: make app

      - name: Create DMG
        run: make dmg

      - name: Create GitHub Release (tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          generate_release_notes: true

      - name: Create GitHub Release (cc-reader sync)
        if: github.event_name == 'repository_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sync-${{ github.event.client_payload.cc_reader_tag }}
          name: Sync with cc-reader ${{ github.event.client_payload.cc_reader_tag }}
          files: dist/*.dmg
          generate_release_notes: true
