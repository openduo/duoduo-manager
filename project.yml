name: DuoduoManager

options:
  createIntermediateGroups: true
  minimumXcodeGenVersion: 2.45.4
  deploymentTarget:
    macOS: "14.0"

packages:
  cc-reader:
    url: https://github.com/kuaner/cc-reader.git
    from: 1.6.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.4.0

settings:
  base:
    PRODUCT_NAME: DuoduoManager
    PRODUCT_BUNDLE_IDENTIFIER: ai.openduo.manager
    INFOPLIST_FILE: Config/Info.plist
    MARKETING_VERSION: 1.6.2
    CURRENT_PROJECT_VERSION: 1
    CODE_SIGN_ENTITLEMENTS: entitlements.mac.plist
    GENERATE_INFOPLIST_FILE: NO
    SWIFT_VERSION: 5.9
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  DuoduoManager:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources
        excludes:
          - Resources
      - path: Sources/Resources
        buildPhase: resources
      - path: Sources/Resources/App/AppIcon.icns
        buildPhase: resources
    dependencies:
      - package: cc-reader
        product: CCReaderKit
      - package: Sparkle
    settings:
      base:
        PRODUCT_MODULE_NAME: DuoduoManager
        EXECUTABLE_NAME: DuoduoManager

schemes:
  DuoduoManager:
    build:
      targets:
        DuoduoManager: all
    run:
      config: Debug
    archive:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug
